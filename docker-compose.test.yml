name: bimstitch-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: bimstitch-test-postgres
    environment:
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bim
      POSTGRES_DB: bimstitch_e2e
    ports:
      - "5435:5432"
    # No volume — ephemeral, destroyed on `down -v`
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim -d bimstitch_e2e"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bimstitch-test-redis
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: bimstitch-test-mailhog
    ports:
      - "1026:1025"
      - "8026:8025"

  minio:
    image: minio/minio:latest
    container_name: bimstitch-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bimstitch
      MINIO_ROOT_PASSWORD: bimstitch-secret
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 10
