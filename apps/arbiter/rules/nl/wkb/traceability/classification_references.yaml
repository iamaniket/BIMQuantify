framework: wkb
rules:
- id: wkb_4_01_wall_reference
  framework: wkb
  article: WKB Hoofdstuk 4, Art. 4.1
  article_number: '4.1'
  category: traceability
  chapter: '4'
  severity: warning
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Wall must have a Reference property
    property: common.reference
  implementation_status: implemented
  titles:
    en: Wall must have classification reference
    nl: Referentieclassificatie wand verplicht
  descriptions:
    en: Every wall element must have a Reference classification for quality traceability
    nl: Elk wandelement moet een Reference-classificatie hebben voor kwaliteitstraceerbaarheid
  applicable_element_types:
  - wall
  min_source_format: ifc
