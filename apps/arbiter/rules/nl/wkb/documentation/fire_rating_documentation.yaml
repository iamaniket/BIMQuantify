framework: wkb
rules:
- id: wkb_3_01_wall_fire_rating_documented
  framework: wkb
  article: WKB Hoofdstuk 3, Art. 3.1
  article_number: '3.1'
  category: documentation
  chapter: '3'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Wall must have FireRating property documented
    property: fire_safety.fire_rating
  implementation_status: implemented
  titles:
    en: Wall fire rating must be documented
    nl: Brandwerendheid wand moet gedocumenteerd zijn
  descriptions:
    en: All walls must have their fire resistance rating explicitly documented as a property
    nl: Alle wanden moeten hun brandwerendheid als eigenschap gedocumenteerd hebben
  applicable_element_types:
  - wall
  min_source_format: ifc
- id: wkb_3_02_slab_fire_rating_documented
