  category: documentation
  chapter: '3'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Slab must have FireRating property documented
    property: fire_safety.fire_rating
  implementation_status: implemented
  titles:
    en: Slab fire rating must be documented
    nl: Brandwerendheid vloer moet gedocumenteerd zijn
  descriptions:
    en: All slabs must have their fire resistance rating explicitly documented
    nl: Alle vloeren moeten hun brandwerendheid als eigenschap gedocumenteerd hebben
  applicable_element_types:
  - slab
  min_source_format: ifc
- id: wkb_3_03_door_fire_rating_documented
  framework: wkb
