rules:
- id: bbl_4_131_purge_ventilation_rate
  article: BBL Afd. 4.3, Art. 4.131
  article_number: '4.131'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.3&artikel=4.131
  legal_text_nl: Een verblijfsruimte heeft een spuivoorziening met een capaciteit van ten minste 3 dm³/s per m² vloeroppervlakte.
  legal_text_en: A habitable room must have a purge ventilation provision with a capacity of at least 3 l/s per m² of floor
    area.
  requirement_summary: Pset_BBL_Ventilation.PurgeVentilationRate >= 3.0 (l/s per m²)
  category: health
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicable_element_types:
  - space
  min_source_format: ifc
  checks:
  - property: health.purge_ventilation_rate
    operator: gte
    threshold: 3.0
    description: Purge ventilation rate must be >= 3.0 l/s per m² of floor area
  implementation_status: implemented
  titles:
    en: Purge ventilation capacity
    nl: Spuivoorziening
  descriptions:
    en: Habitable rooms must provide purge ventilation of at least 3.0 l/s per m² of floor area.
    nl: Een verblijfsruimte heeft een spuivoorziening met een capaciteit van ten minste 3 dm³/s per m² vloeroppervlakte.
  notes: Requires custom Pset_BBL_Ventilation.PurgeVentilationRate to be authored on IfcSpace elements.
