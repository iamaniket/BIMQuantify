rules:
- id: bbl_4_102_non_residential_door_width
  article: BBL Afd. 4.6, Art. 4.102
  article_number: '4.102'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.6&artikel=4.102
  legal_text_nl: Een andere gebruiksfunctie dan een woonfunctie is bereikbaar via een route waarvan alle deuren ten minste
    0,85 m vrije doorgang bieden.
  legal_text_en: A non-residential function must be reachable via a route where all doors have at least 0.85 m clear passage.
  requirement_summary: Public-access doors must have clear width >= 850 mm
  category: accessibility
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicable_element_types:
  - door
  min_source_format: ifc
  applicability_filters:
  - property: common.publicly_accessible
    operator: eq
    value: true
  checks:
  - property: common.clear_width
    operator: gte
    threshold: 850
    unit: mm
    description: Public-access door clear width must be >= 850 mm
  implementation_status: implemented
  titles:
    en: Non-residential function door accessibility
    nl: Toegankelijkheid gebruiksfunctie - deurbreedte
  descriptions:
    en: Doors in publicly accessible non-residential functions must have a clear passage width of at least 850 mm.
    nl: Deuren in openbaar toegankelijke gebruiksfuncties moeten een vrije doorgang van ten minste 0,85 m bieden.
  notes: Per-element door width check for publicly accessible doors. Full route verification requires spatial analysis (out of scope).
