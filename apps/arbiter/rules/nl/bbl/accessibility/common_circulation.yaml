rules:
- id: bbl_4_22_common_circulation_area
  article: BBL Afd. 4.6, Art. 4.22
  article_number: '4.22'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.6&artikel=4.22
  legal_text_nl: Een gemeenschappelijke verkeersruimte heeft een vrije vloeroppervlakte van ten minste 4 m².
  legal_text_en: A common circulation space must have a clear floor area of at least 4 m².
  requirement_summary: Qto_SpaceBaseQuantities.NetFloorArea >= 4 m² for circulation spaces
  category: accessibility
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicability_filters:
  - operator: contains
    value: Circulation
    property: common.occupancy_type
  checks:
  - operator: gte
    threshold: 4
    unit: m²
    description: Common circulation area must be >= 4 m²
    property: quantities.net_floor_area
  implementation_status: implemented
  titles:
    en: Common circulation minimum area
    nl: Gemeenschappelijke verkeersruimte
  descriptions:
    en: Common circulation spaces (corridors, halls) must have a clear floor area of at least 4 m².
    nl: Een gemeenschappelijke verkeersruimte heeft een vrije vloeroppervlakte van ten minste 4 m².
  applicable_element_types:
  - space
  min_source_format: ifc
