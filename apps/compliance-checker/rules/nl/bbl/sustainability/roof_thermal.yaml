rules:
- id: bbl_4_163_roof_u_value
  article: BBL Afd. 4.4, Art. 4.163
  article_number: '4.163'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.4&artikel=4.163
  legal_text_nl: Een uitwendige scheidingsconstructie van een verblijfsgebied, een toiletruimte of een badruimte heeft een
    warmtedoorgangscoëfficiënt van ten hoogste 0,30 W/m²·K.
  legal_text_en: An external partition of a habitable area, toilet or bathroom must have a thermal transmittance of at most
    0.30 W/(m²·K).
  requirement_summary: Pset_RoofCommon.ThermalTransmittance <= 0.30 W/m²·K (external roofs)
  category: sustainability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicability_filters:
  - operator: eq
    value: true
    property: common.is_external
  checks:
  - operator: lte
    threshold: 0.3
    description: U-value must be <= 0.30 W/m²·K
    property: thermal.thermal_transmittance
  implementation_status: implemented
  titles:
    en: External roof thermal transmittance (U-value)
    nl: Thermische isolatie - U-waarde dak
  descriptions:
    en: External roofs must have a thermal transmittance (U-value) of at most 0.30 W/(m²·K) to limit heat loss in new construction.
    nl: Een uitwendige scheidingsconstructie (dak) heeft een warmtedoorgangscoëfficiënt van ten hoogste 0,30 W/m²·K.
  applicable_element_types:
  - roof
  min_source_format: ifc
