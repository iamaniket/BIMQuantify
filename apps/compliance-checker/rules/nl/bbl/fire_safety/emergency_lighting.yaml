rules:
- id: bbl_4_42_emergency_lighting_present
  article: BBL Afd. 4.2, Art. 4.42
  article_number: '4.42'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.2&artikel=4.42
  legal_text_nl: Een vluchtroute is voorzien van noodverlichting.
  legal_text_en: An escape route must be provided with emergency lighting.
  requirement_summary: Escape-route IfcSpace.Pset_BBL_EmergencyLighting.Present must exist
  category: fire_safety
  chapter: '4'
  severity: warning
  applicable_building_types:
  - all
  applicability_filters:
  - operator: contains
    value: Escape
    property: common.occupancy_type
  checks:
  - operator: exists
    description: Emergency lighting flag must be authored on escape-route spaces
    property: fire_safety.emergency_lighting_present
  implementation_status: implemented
  notes: Requires a custom Pset_BBL_EmergencyLighting.Present boolean on escape-route IfcSpace elements. Skips silently when
    the property is absent rather than failing — adopt the convention to enforce.
  titles:
    en: Emergency lighting in escape route
    nl: Noodverlichting in vluchtroute
  descriptions:
    en: Escape-route spaces must declare an emergency lighting provision via Pset_BBL_EmergencyLighting.Present.
    nl: Een vluchtroute is voorzien van noodverlichting.
  applicable_element_types:
  - space
  min_source_format: ifc
