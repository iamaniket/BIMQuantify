rules:
- id: bbl_4_40_escape_door_width
  article: BBL Afd. 4.2, Art. 4.40
  article_number: '4.40'
  category: fire_safety
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 850
    unit: mm
    description: Escape route door width must be >= 850mm
    property: common.width
  implementation_status: implemented
  notes: Applies to all doors; refinement needed to filter only doors in escape routes via custom pset or IfcRelAssigns.
  titles:
    en: Escape route door minimum width
    nl: Vluchtroute - breedte deur
  descriptions:
    en: Doors in escape routes must have a minimum clear width of 850mm
    nl: Een deur in een vluchtroute heeft een vrije breedte van ten minste 0,85 m
  applicable_element_types:
  - door
  min_source_format: ifc
- id: bbl_4_41_escape_door_self_closing
  article: BBL Afd. 4.2, Art. 4.41
  article_number: '4.41'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.2&artikel=4.41
  legal_text_nl: Een deur in een vluchtroute is zelfsluitend.
  legal_text_en: A door in an escape route must be self-closing.
  requirement_summary: Pset_DoorCommon.SelfClosing must be true for fire-exit doors
  category: fire_safety
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicability_filters:
  - property: fire_safety.is_fire_exit
    operator: eq
    value: true
  checks:
  - property: fire_safety.is_self_closing
    operator: eq
    threshold: true
    description: Escape route doors must be self-closing
  implementation_status: implemented
  titles:
    en: Escape route door self-closing
    nl: Inrichting vluchtroute - zelfsluitende deur
  descriptions:
    en: Doors designated as fire exits in escape routes must be self-closing per Pset_DoorCommon.SelfClosing.
    nl: Een deur in een vluchtroute is zelfsluitend.
  applicable_element_types:
  - door
  min_source_format: ifc
