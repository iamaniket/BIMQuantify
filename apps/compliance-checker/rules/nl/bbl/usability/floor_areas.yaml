rules:
- id: bbl_4_86_habitable_room_area
  article: BBL Afd. 4.5, Art. 4.86
  article_number: '4.86'
  category: usability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 5.0
    unit: m2
    description: Floor area must be >= 5.0 mÂ²
    property: quantities.gross_floor_area
  - operator: gte
    threshold: 5.0
    unit: m2
    description: Floor area (from Qto) must be >= 5.0 mÂ²
    property: quantities.gross_floor_area
  implementation_status: implemented
  titles:
    en: Minimum habitable room floor area
    nl: Vloeroppervlakte verblijfsruimte
  descriptions:
    en: A habitable room must have a minimum floor area of 5.0 mÂ²
    nl: Een verblijfsruimte heeft een vloeroppervlakte van ten minste 5 mÂ²
  applicable_element_types:
  - space
  min_source_format: ifc
- id: bbl_4_87_toilet_area
  article: BBL Afd. 4.5, Art. 4.87
  article_number: '4.87'
  category: usability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 1.1
    unit: m2
    description: Floor area must be >= 1.1 mÂ²
    property: quantities.gross_floor_area
  implementation_status: implemented
  notes: Only applies to spaces classified as toilet/bathroom. Classification depends on IFC space naming or custom psets.
  titles:
    en: Minimum toilet/bathroom floor area
    nl: Vloeroppervlakte toiletruimte/badruimte
  descriptions:
    en: A toilet room or bathroom must have a minimum floor area of 1.1 mÂ²
    nl: Een toiletruimte of badruimte heeft een vloeroppervlakte van ten minste 1,1 mÂ²
  applicable_element_types:
  - space
  min_source_format: ifc
