rules:
- id: bbl_4_85_room_height_new
  article: BBL Afd. 4.5, Art. 4.85
  article_number: '4.85'
  category: usability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 2600
    unit: mm
    description: Room height must be >= 2600mm
    property: common.height
  - operator: gte
    threshold: 2600
    unit: mm
    description: Room height (from BaseQuantities) must be >= 2600mm
    property: common.height
  implementation_status: implemented
  titles:
    en: Minimum room height - new construction
    nl: Vrije hoogte verblijfsruimte - nieuwbouw
  descriptions:
    en: Habitable rooms in new construction must have a minimum clear height of 2600mm
    nl: Een verblijfsruimte heeft een vrije hoogte van ten minste 2,6 m, gemeten vanaf de afgewerkte vloer tot het afgewerkte
      plafond
  applicable_element_types:
  - space
  min_source_format: ifc
- id: bbl_3_71_room_height_existing
  article: BBL Afd. 3.5, Art. 3.71
  article_number: '3.71'
  category: usability
  chapter: '3'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 2100
    unit: mm
    description: Room height must be >= 2100mm
    property: common.height
  implementation_status: implemented
  titles:
    en: Minimum room height - existing building
    nl: Vrije hoogte verblijfsruimte - bestaand
  descriptions:
    en: Habitable rooms in existing buildings must have a minimum clear height of 2100mm
    nl: Een verblijfsruimte heeft een vrije hoogte van ten minste 2,1 m
  applicable_element_types:
  - space
  min_source_format: ifc
