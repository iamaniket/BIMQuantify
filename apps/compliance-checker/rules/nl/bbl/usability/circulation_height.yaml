rules:
- id: bbl_4_25_circulation_height
  article: BBL Afd. 4.5, Art. 4.25
  article_number: '4.25'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.5&artikel=4.25
  legal_text_nl: Een verkeersruimte heeft een vrije hoogte van ten minste 2,3 m boven de vloer.
  legal_text_en: A circulation space has a clear height of at least 2.3 m above the floor.
  requirement_summary: Pset_SpaceCommon.Height â‰¥ 2300 mm for circulation spaces
  category: usability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicability_filters:
  - operator: matches
    value: (?i)(corridor|hallway|circulation|hall|gang|verkeer)
    property: common.reference
  checks:
  - operator: gte
    threshold: 2300
    unit: mm
    description: Circulation height must be >= 2300mm
    property: common.height
  implementation_status: implemented
  titles:
    en: Minimum clear height of circulation space
    nl: Vrije hoogte verkeersruimte
  descriptions:
    en: Circulation spaces (corridors, hallways) must have a minimum clear height of 2300mm to permit safe passage.
    nl: Een verkeersruimte heeft een vrije hoogte van ten minste 2,3 m, gemeten vanaf de afgewerkte vloer tot het afgewerkte
      plafond.
  applicable_element_types:
  - space
  min_source_format: ifc
