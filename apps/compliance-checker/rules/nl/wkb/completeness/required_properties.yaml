framework: wkb
rules:
- id: wkb_2_01_loadbearing_property
  framework: wkb
  article: WKB Hoofdstuk 2, Art. 2.1
  article_number: '2.1'
  category: completeness
  chapter: '2'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Wall must have LoadBearing property
    property: common.is_load_bearing
  implementation_status: implemented
  titles:
    en: LoadBearing property must be present
    nl: LoadBearing eigenschap verplicht
  descriptions:
    en: All walls must document whether they are load-bearing for structural quality assurance
    nl: Alle wanden moeten aangeven of ze dragend zijn voor constructieve kwaliteitsborging
  applicable_element_types:
  - wall
  min_source_format: ifc
- id: wkb_2_02_is_external_property
  framework: wkb
  article: WKB Hoofdstuk 2, Art. 2.2
  article_number: '2.2'
  category: completeness
  chapter: '2'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Element must have IsExternal property
    property: common.is_external
  - operator: exists
    description: Door must have IsExternal property
    property: common.is_external
  implementation_status: implemented
  titles:
    en: IsExternal property must be present
    nl: IsExternal eigenschap verplicht
  descriptions:
    en: All walls and doors must document whether they are external-facing
    nl: Alle wanden en deuren moeten aangeven of ze aan de buitenzijde liggen
  applicable_element_types:
  - wall
  - door
  min_source_format: ifc
- id: wkb_2_03_thermal_properties
  framework: wkb
  article: WKB Hoofdstuk 2, Art. 2.3
  article_number: '2.3'
  category: completeness
  chapter: '2'
  severity: warning
  applicable_building_types:
  - all
  checks:
  - operator: exists
    description: Wall must have ThermalTransmittance property
    property: thermal.thermal_transmittance
  implementation_status: implemented
  notes: Ideally only applies to external walls. Currently checks all walls.
  titles:
    en: Thermal transmittance must be documented for external walls
    nl: Thermische eigenschappen buitenwand verplicht
  descriptions:
    en: External walls must have thermal transmittance (U-value) documented
    nl: Buitenwanden moeten de thermische doorlatendheid (U-waarde) gedocumenteerd hebben
  applicable_element_types:
  - wall
  min_source_format: ifc
