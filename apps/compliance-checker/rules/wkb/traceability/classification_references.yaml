framework: wkb
rules:
  - id: wkb_4_01_wall_reference
    framework: wkb
    article: "WKB Hoofdstuk 4, Art. 4.1"
    article_number: "4.1"
    title: "Wall must have classification reference"
    title_nl: "Referentieclassificatie wand verplicht"
    description: "Every wall element must have a Reference classification for quality traceability"
    description_nl: "Elk wandelement moet een Reference-classificatie hebben voor kwaliteitstraceerbaarheid"
    category: traceability
    chapter: "4"
    severity: warning
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcWall]
    checks:
      - property_set: "Pset_WallCommon"
        property_name: "Reference"
        operator: exists
        description: "Wall must have a Reference property"
    implementation_status: implemented

  - id: wkb_4_02_door_reference
    framework: wkb
    article: "WKB Hoofdstuk 4, Art. 4.2"
    article_number: "4.2"
    title: "Door must have classification reference"
    title_nl: "Referentieclassificatie deur verplicht"
    description: "Every door element must have a Reference classification for quality traceability"
    description_nl: "Elk deurelement moet een Reference-classificatie hebben voor kwaliteitstraceerbaarheid"
    category: traceability
    chapter: "4"
    severity: warning
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcDoor]
    checks:
      - property_set: "Pset_DoorCommon"
        property_name: "Reference"
        operator: exists
        description: "Door must have a Reference property"
    implementation_status: implemented

  - id: wkb_4_03_window_reference
    framework: wkb
    article: "WKB Hoofdstuk 4, Art. 4.3"
    article_number: "4.3"
    title: "Window must have classification reference"
    title_nl: "Referentieclassificatie raam verplicht"
    description: "Every window element must have a Reference classification for quality traceability"
    description_nl: "Elk raamelement moet een Reference-classificatie hebben voor kwaliteitstraceerbaarheid"
    category: traceability
    chapter: "4"
    severity: warning
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcWindow]
    checks:
      - property_set: "Pset_WindowCommon"
        property_name: "Reference"
        operator: exists
        description: "Window must have a Reference property"
    implementation_status: implemented
