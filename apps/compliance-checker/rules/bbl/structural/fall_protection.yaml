rules:
- id: bbl_4_18_railing_height
  article: BBL Afd. 4.2, Art. 4.18
  article_number: '4.18'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.2&artikel=4.18
  legal_text_nl: Een vloer, een trap of een hellingbaan met een rand waar het hoogteverschil groter is dan 1 m, heeft een
    niet beklimbare afscheiding met een hoogte van ten minste 1,0 m gemeten vanaf het loopvlak.
  legal_text_en: A floor, stair or ramp with an edge where the height difference exceeds 1 m has a non-climbable barrier of
    at least 1.0 m measured from the walking surface.
  requirement_summary: Pset_RailingCommon.Height â‰¥ 1000 mm
  category: structural
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  checks:
  - operator: gte
    threshold: 1000
    unit: mm
    description: Railing height must be >= 1000mm
    property: common.height
  implementation_status: implemented
  titles:
    en: Minimum railing height for fall protection
    nl: Bescherming tegen vallen - hoogte hekwerk
  descriptions:
    en: Railings/balustrades must be at least 1000mm tall to provide adequate fall protection at edges and openings.
    nl: Een vloer, een trap of een hellingbaan met een hoogteverschil dat groter is dan 1 m heeft een afscheiding met een
      hoogte van ten minste 1,0 m.
  applicable_element_types:
  - railing
  min_source_format: ifc
