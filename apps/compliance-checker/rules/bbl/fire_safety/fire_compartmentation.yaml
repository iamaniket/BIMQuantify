rules:
  - id: bbl_4_30_wall_fire_rating
    article: "BBL Afd. 4.2, Art. 4.30"
    article_number: "4.30"
    title: "Wall fire resistance (WBDBO)"
    title_nl: "Beperking uitbreiding brand - wand"
    description: "Walls forming fire compartment boundaries must have a fire resistance (WBDBO) of at least 60 minutes"
    description_nl: "Een scheidingsconstructie tussen brandcompartimenten heeft een weerstand tegen branddoorslag en brandoverslag (WBDBO) van ten minste 60 minuten"
    category: fire_safety
    chapter: "4"
    severity: error
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcWall]
    checks:
      - property_set: "Pset_WallCommon"
        property_name: "FireRating"
        operator: gte
        threshold: 60
        unit: min
        description: "Wall fire rating must be >= 60 minutes"
    implementation_status: implemented

  - id: bbl_4_30_slab_fire_rating
    article: "BBL Afd. 4.2, Art. 4.30"
    article_number: "4.30"
    title: "Slab fire resistance (WBDBO)"
    title_nl: "Beperking uitbreiding brand - vloer"
    description: "Slabs forming fire compartment boundaries must have a fire resistance (WBDBO) of at least 60 minutes"
    description_nl: "Een scheidingsconstructie tussen brandcompartimenten heeft een WBDBO van ten minste 60 minuten"
    category: fire_safety
    chapter: "4"
    severity: error
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcSlab]
    checks:
      - property_set: "Pset_SlabCommon"
        property_name: "FireRating"
        operator: gte
        threshold: 60
        unit: min
        description: "Slab fire rating must be >= 60 minutes"
    implementation_status: implemented
