rules:
- id: bbl_4_163_floor_u_value
  article: BBL Afd. 4.4, Art. 4.163
  article_number: '4.163'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.4&artikel=4.163
  legal_text_nl: Een uitwendige scheidingsconstructie van een verblijfsgebied, een toiletruimte of een badruimte heeft een
    warmtedoorgangscoëfficiënt van ten hoogste 0,30 W/m²·K.
  legal_text_en: An external partition of a habitable area, toilet or bathroom must have a thermal transmittance of at most
    0.30 W/(m²·K).
  requirement_summary: Pset_SlabCommon.ThermalTransmittance <= 0.30 W/m²·K (external floors)
  category: sustainability
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicable_ifc_entities:
  - IfcSlab
  applicability_filters:
  - property_set: Pset_SlabCommon
    property_name: IsExternal
    operator: eq
    value: true
  checks:
  - property_set: Pset_SlabCommon
    property_name: ThermalTransmittance
    operator: lte
    threshold: 0.3
    description: U-value must be <= 0.30 W/m²·K
  implementation_status: implemented
  titles:
    en: External floor thermal transmittance (U-value)
    nl: Thermische isolatie - U-waarde vloer
  descriptions:
    en: External floors (ground floor, floors above unheated spaces) must have a thermal transmittance of at most 0.30 W/(m²·K).
    nl: Een uitwendige scheidingsconstructie (vloer) heeft een warmtedoorgangscoëfficiënt van ten hoogste 0,30 W/m²·K.
