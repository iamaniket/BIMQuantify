rules:
- id: bbl_4_104_ramp_height_difference_slope
  article: BBL Afd. 4.6, Art. 4.104
  article_number: '4.104'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.6&artikel=4.104
  legal_text_nl: Een hellingbaan ter overbrugging van een hoogteverschil heeft een helling van ten hoogste 1:12 voor hoogteverschillen
    tot 0,25 m en ten hoogste 1:16 voor grotere hoogteverschillen.
  legal_text_en: A ramp bridging a height difference must have a slope of at most 1:12 for differences up to 0.25 m and at
    most 1:16 for greater differences.
  requirement_summary: Accessibility ramp Pset_RampFlightCommon.Slope <= 0.0625 (1:16)
  category: accessibility
  chapter: '4'
  severity: error
  applicable_building_types:
  - all
  applicability_filters:
  - operator: exists
    property: ramp.accessibility_performance
  checks:
  - operator: lte
    threshold: 0.0625
    description: Accessibility ramp slope must be <= 1:16 (0.0625)
    property: ramp.slope
  implementation_status: partial
  notes: Stricter accessibility threshold (1:16) applies only when AccessibilityPerformance is authored on the ramp. The general
    ramp slope cap (1:12) is checked by bbl_4_28_ramp_slope.
  titles:
    en: Accessibility ramp slope
    nl: Hellingbaan bij hoogteverschil
  descriptions:
    en: Ramps designated for accessibility (bridging height differences) must have a slope of at most 1:16.
    nl: Een hellingbaan ter overbrugging van een hoogteverschil heeft een helling van ten hoogste 1:16.
  applicable_element_types:
  - ramp_flight
  min_source_format: ifc
