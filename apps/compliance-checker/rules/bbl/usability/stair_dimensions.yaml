rules:
  - id: bbl_4_27_stair_riser_height
    article: "BBL Afd. 4.5, Art. 4.27"
    article_number: "4.27"
    source_url: "https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.5&artikel=4.27"
    title: "Maximum stair riser height"
    title_nl: "Afmeting trap - optrede"
    description: "Stair flights must have a riser height of at most 188mm to permit safe ascent and descent."
    description_nl: "De optrede van een trap is ten hoogste 188 mm."
    legal_text_nl: "De afmeting van een trap is zodanig dat de optrede ten hoogste 188 mm bedraagt."
    legal_text_en: "Stair dimensions must be such that the riser is no more than 188 mm."
    requirement_summary: "Pset_StairFlightCommon.RiserHeight ≤ 188 mm"
    category: usability
    chapter: "4"
    severity: error
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcStairFlight]
    checks:
      - property_set: "Pset_StairFlightCommon"
        property_name: "RiserHeight"
        operator: lte
        threshold: 188
        unit: mm
        description: "Riser height must be <= 188mm"
    implementation_status: implemented

  - id: bbl_4_27_stair_tread_length
    article: "BBL Afd. 4.5, Art. 4.27"
    article_number: "4.27"
    source_url: "https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.5&artikel=4.27"
    title: "Minimum stair tread length"
    title_nl: "Afmeting trap - aantrede"
    description: "Stair flights must have a tread length of at least 220mm so the foot is fully supported."
    description_nl: "De aantrede van een trap is ten minste 220 mm."
    legal_text_nl: "De afmeting van een trap is zodanig dat de aantrede ten minste 220 mm bedraagt."
    legal_text_en: "Stair dimensions must be such that the tread is at least 220 mm."
    requirement_summary: "Pset_StairFlightCommon.TreadLength ≥ 220 mm"
    category: usability
    chapter: "4"
    severity: error
    applicable_building_types: [all]
    applicable_ifc_entities: [IfcStairFlight]
    checks:
      - property_set: "Pset_StairFlightCommon"
        property_name: "TreadLength"
        operator: gte
        threshold: 220
        unit: mm
        description: "Tread length must be >= 220mm"
    implementation_status: implemented
