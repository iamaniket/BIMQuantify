rules:
- id: bbl_4_89_outdoor_space_area
  article: BBL Afd. 4.5, Art. 4.89
  article_number: '4.89'
  source_url: https://wetten.overheid.nl/jci1.3:c:BWBR0046225&hoofdstuk=4&afdeling=4.5&artikel=4.89
  legal_text_nl: Een buitenruimte voor een woonfunctie heeft een vloeroppervlakte van ten minste 4 m² met een breedte van ten
    minste 1,5 m.
  legal_text_en: An outdoor space for a residential occupancy must have a floor area of at least 4 m² with a width of at least
    1.5 m.
  requirement_summary: Outdoor IfcSpace.Qto_SpaceBaseQuantities.NetFloorArea >= 4 m²
  category: usability
  chapter: '4'
  severity: error
  applicable_building_types:
  - residential
  applicable_ifc_entities:
  - IfcSpace
  applicability_filters:
  - property_set: Pset_SpaceCommon
    property_name: OccupancyType
    operator: in_list
    value:
    - Balcony
    - Terrace
    - Roof terrace
  checks:
  - property_set: Qto_SpaceBaseQuantities
    property_name: NetFloorArea
    operator: gte
    threshold: 4
    unit: m²
    description: Outdoor space area must be >= 4 m²
  implementation_status: implemented
  titles:
    en: Residential outdoor space minimum area
    nl: Buitenruimte
  descriptions:
    en: Outdoor spaces (balconies, terraces, roof terraces) for residential occupancies must have a floor area of at least 4 m².
    nl: Een buitenruimte voor een woonfunctie heeft een vloeroppervlakte van ten minste 4 m².
