<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>BimDossier Viewer</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #ffffff;
      }
      /* Pane-fill helper for a viewer shell whose absolute canvas/overlay
         children must fill the pane (the portal uses Tailwind's `absolute
         inset-0`; the embed has no Tailwind). Currently unused — kept for the
         rebuilt mobile 2D viewer. */
      .viewer-pane-fill {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
