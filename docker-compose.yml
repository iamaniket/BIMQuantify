services:
  postgres:
    image: postgres:16-alpine
    container_name: bimquantify-postgres
    environment:
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bim
      POSTGRES_DB: bimquantify
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim -d bimquantify"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: bimquantify-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
