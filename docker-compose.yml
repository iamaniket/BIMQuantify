services:
  postgres:
    image: postgres:16-alpine
    container_name: bimdossier-postgres
    environment:
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bim
      POSTGRES_DB: bimdossier
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim -d bimdossier"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: bimdossier-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    container_name: bimdossier-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: bimdossier-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bimdossier
      MINIO_ROOT_PASSWORD: bimdossier-secret
      # Dev-only: allow any origin so the viewer-embed local harness (:5173), an
      # iOS LAN origin, and any preview port can fetch presigned model bytes.
      # Presigned URLs are already signed, so a cross-origin GET grants nothing
      # extra. Production sets an explicit allow-list via S3_CORS_ORIGINS.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  processor:
    build:
      context: ./apps/processor
      dockerfile: Dockerfile
    container_name: bimdossier-processor
    # Resource guardrails. Chromium (Puppeteer) + web-ifc WASM at
    # JOB_CONCURRENCY=2 on a 2 GiB IFC (JOB_MAX_FILE_BYTES) can spike to several
    # GB, and the Node heap alone is tuned to 4 GiB (see Dockerfile NODE_OPTIONS):
    #   * mem_limit   — cap so an OOM kills only this container, never the host.
    #   * shm_size    — Chromium OOMs on the default 64 MB /dev/shm when
    #                   rendering large PDFs; give it room.
    #   * restart     — an OOM-killed worker must self-heal, else in-flight jobs
    #                   sit orphaned in `running` until the reconcile sweeper.
    # The production task/pod spec MUST set the equivalent resources.limits +
    # restart policy + a readiness probe (see the beta-readiness roadmap, P1-A).
    restart: unless-stopped
    mem_limit: 6g
    shm_size: 1g
    environment:
      NODE_ENV: development
      PORT: "8080"
      REDIS_URL: redis://redis:6379/2
      # Deliver worker-sent emails (deadline reminders, etc.) to the host
      # MailHog. The worker runs inside the container, so localhost would be the
      # container itself — reach the host MailHog (SMTP 1025) via the gateway.
      SMTP_HOST: host.docker.internal
      SMTP_PORT: "1025"
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: bimdossier
      S3_SECRET_ACCESS_KEY: bimdossier-secret
      S3_BUCKET_IFC: ifc-files
      # apps/api still runs on the host during dev, so the worker reaches
      # it via host.docker.internal. Override to http://api:8000 if/when 
      # API is containerised.
      API_BASE_URL: http://host.docker.internal:8000
      PROCESSOR_SHARED_SECRET: ${PROCESSOR_SHARED_SECRET:-dev-shared-secret-change-me}
      # Optional error tracking — no-op when SENTRY_DSN is unset (see src/sentry.ts).
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Published only for local debugging — production should keep this on
      # the internal docker network.
      - "8088:8080"

  arbiter:
    build:
      context: ./apps/arbiter
      dockerfile: Dockerfile
    container_name: bimdossier-arbiter
    environment:
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      # Dev-only credentials. The config fields no longer carry these as code
      # defaults (a missing var fails closed at construction); supplied here so
      # the local stack works. DEPLOY_REGION=dev opts this stack into the
      # config-guard skip — a real deploy sets DEPLOY_REGION to its region, and
      # the guard then refuses to boot on these dev values.
      S3_ACCESS_KEY_ID: bimdossier
      S3_SECRET_ACCESS_KEY: bimdossier-secret
      S3_BUCKET_IFC: ifc-files
      DEPLOY_REGION: dev
      ARBITER_HOST: "0.0.0.0"
      ARBITER_PORT: "8090"
      # Shared bearer between the API and this MCP server. Must match the API's
      # ARBITER_SHARED_SECRET (the host-run API reads it from apps/api/.env).
      # The guard refuses to boot on this dev value outside DEPLOY_REGION=dev.
      ARBITER_SHARED_SECRET: ${ARBITER_SHARED_SECRET:-dev-arbiter-secret-change-me}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      # Bound to loopback only: the host-run API reaches it via 127.0.0.1:8090,
      # but it is NOT exposed to the LAN. Production must NOT publish this port at
      # all — keep the Arbiter on the internal docker network (it reads the shared
      # IFC bucket and rewrites rule packs; bearer auth is the backstop, not the
      # boundary).
      - "127.0.0.1:8090:8090"

  # --- Front-end apps (opt-in) ----------------------------------------------
  # web + portal are Next.js apps built to a standalone server (see their
  # Dockerfiles). They are gated behind the `frontend` profile so the default
  # dev flow (`docker compose up -d`) stays fast — during local dev you normally
  # run `pnpm --filter=web dev` / `--filter=portal dev` on the host instead.
  # Bring the containerised front-ends up with:
  #     docker compose --profile frontend up -d --build web portal
  #
  # NEXT_PUBLIC_* are BROWSER-facing and inlined at BUILD time, so they are
  # passed as `build.args`. The subset that next.config also evaluates at server
  # start (CSP headers, redirects) is repeated under `environment`. These are the
  # URLs the USER'S BROWSER uses — host/public origins, NOT docker service names.
  # For a real deploy, override every value to your public hostnames and rebuild.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_STANDALONE: ${NEXT_PUBLIC_STANDALONE:-false}
        NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL:-http://localhost:3001}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_STORAGE_URL: ${NEXT_PUBLIC_STORAGE_URL:-http://localhost:9000}
        NEXT_PUBLIC_ENABLE_LOGIN: ${NEXT_PUBLIC_ENABLE_LOGIN:-false}
        NEXT_PUBLIC_ENABLE_SIGNUP: ${NEXT_PUBLIC_ENABLE_SIGNUP:-false}
        NEXT_PUBLIC_ENABLE_REQUEST_ACCESS: ${NEXT_PUBLIC_ENABLE_REQUEST_ACCESS:-false}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    image: bimdossier-web
    container_name: bimdossier-web
    profiles: ["frontend"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Re-read by next.config's redirects()/headers() at server start.
      NEXT_PUBLIC_STANDALONE: ${NEXT_PUBLIC_STANDALONE:-false}
      NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL:-http://localhost:3001}
      NEXT_PUBLIC_STORAGE_URL: ${NEXT_PUBLIC_STORAGE_URL:-http://localhost:9000}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    # So server-side blog SSR (fetch to NEXT_PUBLIC_API_URL) can reach a host-run
    # API during local dev if pointed at host.docker.internal. Failures degrade
    # to in-repo MDX, so this is best-effort.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_STORAGE_URL: ${NEXT_PUBLIC_STORAGE_URL:-http://localhost:9000}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: bimdossier-portal
    container_name: bimdossier-portal
    profiles: ["frontend"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Re-read by next.config's headers() (CSP connect-src/img-src) at server start.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_STORAGE_URL: ${NEXT_PUBLIC_STORAGE_URL:-http://localhost:9000}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"

volumes:
  pgdata:
  redisdata:
  miniodata:
